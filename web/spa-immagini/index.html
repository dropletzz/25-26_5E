<html>
    <head>
        <title>SPA immagini</title>
        <style>
            .contenitore-immagine {
                text-align: center;
                height: 70vh;
                margin: 20px;
            }
            #immagine {
                height: 100%;
            }

            .azioni {
                display: flex;
                justify-content: center;
            }
            .azioni .bottone {
                background-color:darkseagreen;
                font-weight: 600;
                font-size: 25px;
                margin: 10px;
                padding: 15px;
                border-radius: 8px;
                cursor: pointer;
                user-select: none;
                border: 2px solid transparent;
            }
            .azioni .bottone:hover {
                border: 2px solid #777;
            }

            .cornice {
                margin: 25px;
                padding: 25px;
                padding-top: 0px;
                border: 4px solid #373737;
                border-radius: 10px;
                background-color: #DEDEDE;
            }
            #immagini-salvate {
                display: flex;
                justify-content: space-around;
                flex-wrap: wrap;
            }
            #immagini-salvate img {
                height: 250px;
            }
        </style>
    </head>

    <body>
        <div class="contenitore-immagine">
            <img id="immagine" src="https://cataas.com/cat/hh0zY57P78neGxOx" alt="">
        </div>

        <div class="azioni">
            <div id="nuova-img" class="bottone">Nuova immagine</div>
            <div id="salva-img" class="bottone">Salva</div>
        </div>

        <div class="cornice">
            <h1>Immagini salvate</h1>
            <div id="immagini-salvate">
                <img src="https://cataas.com/cat/GG60pG3pxtOK1AUt" alt="">
                <img src="https://cataas.com/cat/s0pfwbJ9ioNGt7Z9" alt="">
            </div>
        </div>

            // Inerisci qui il codice JS
        </script>
    </body>

</html>
